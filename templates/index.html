<!DOCTYPE html>
<html>
<head>
    <title>AI News Classifier</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            width: 450px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2a5298;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        textarea:focus {
            outline: none;
            border: 1px solid #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.5);
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            transform: scale(1.05);
        }

        .prediction {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c72;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📰 AI News Classifier</h2>

        <form action="/predict_text" method="POST">
            <textarea name="news_text" placeholder="Enter your news text here..."></textarea>
            <button type="submit">Classify</button>
        </form>

        {% if prediction %}
            <div class="prediction">
                Prediction: {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
